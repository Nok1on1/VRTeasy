# Maven
# Build your Java project and run tests with Apache Maven.
# Add steps that analyze code, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/java

trigger:
  tags:
    include:
      - '*'
pool:
  name: testazureagent
resources:
  repositories:
    - repository: pipeline_templates
      type: git
      name: "Test Automation Common/pipeline_templates"
extends:
  template: 'SharedLibraries/MavenSharedLibrary.yaml@pipeline_templates'
  parameters:
    jdkVersion: '17'